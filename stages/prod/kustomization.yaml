apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- configmap.yaml

patches:
- target:
    kind: Service
    name: kargo-demo
  patch: |-
    - op: replace
      path: /spec/ports/0/nodePort
      value: 32082
- target:
    kind: Service
    name: kargo-podinfo
  patch: |-
    - op: replace
      path: /spec/ports/0/nodePort
      value: 32092
